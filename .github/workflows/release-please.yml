name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create or update release
        uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
