name: Publish Package

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to publish
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: publish-${{ inputs.tag_name || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 9.0.x

      - name: Verify release version
        shell: bash
        run: |
          version="$(dotnet msbuild UsenetSharp/UsenetSharp.csproj -getProperty:Version)"
          test "${RELEASE_TAG}" = "v${version}"

      - name: Restore locked dependencies
        run: dotnet restore UsenetSharp.sln --locked-mode

      - name: Build
        run: dotnet build UsenetSharp.sln --configuration Release --no-restore

      - name: Run deterministic tests
        run: dotnet test UsenetSharp.sln --configuration Release --no-build --filter "TestCategory!=Integration"

      - name: Pack
        run: dotnet pack UsenetSharp/UsenetSharp.csproj --configuration Release --no-build --output artifacts

      - name: Validate package contents
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import zipfile

          packages = glob.glob("artifacts/*.nupkg")
          symbols = glob.glob("artifacts/*.snupkg")
          assert len(packages) == 1, packages
          assert len(symbols) == 1, symbols

          with zipfile.ZipFile(packages[0]) as package:
              names = set(package.namelist())
              assert {
                  "lib/net9.0/UsenetSharp.dll",
                  "lib/net9.0/UsenetSharp.xml",
                  "README.md",
                  "LICENSE",
                  "CHANGELOG.md",
              } <= names

          with zipfile.ZipFile(symbols[0]) as symbol_package:
              assert "lib/net9.0/UsenetSharp.pdb" in symbol_package.namelist()
          PY

      - name: Upload release packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ env.RELEASE_TAG }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Attest package provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/*

      - name: Publish to GitHub Packages
        run: dotnet nuget push "artifacts/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
